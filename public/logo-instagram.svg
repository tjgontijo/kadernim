<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&amp;display=swap');
      
      .paper-bg { fill: #FBF6EC; } /* Fundo paper da identidade da Kadernim */
      .book-bg { fill: #FFFFFF; }
      
      /* Bordas com a cor escura (Ink) conforme solicitado */
      .book-border { fill: none; stroke: #2B2620; stroke-width: 4px; stroke-linejoin: round; }
      .spine-lines { fill: none; stroke: #2B2620; stroke-width: 3px; }
      
      .spiral {
        fill: #FFFFFF;
        stroke: #2B2620;
        stroke-width: 3.5px;
      }
      
      .k-letter {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 600;
        font-size: 280px;
        fill: #D97757; /* K em Terracotta para o destaque */
      }
      
      .brand-name {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 600;
        font-size: 84px;
        letter-spacing: -0.02em;
        fill: #2B2620; /* Kadernim na cor Ink */
      }
    </style>
    
    <!-- Sombra mais definida e densa do caderno -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2B2620" flood-opacity="0.12" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2B2620" flood-opacity="0.06" />
    </filter>
    
    <!-- Sombra sutil das argolas -->
    <filter id="spiral-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2B2620" flood-opacity="0.15" />
    </filter>
    
    <!-- Degradê suave para dar volume à lombada -->
    <linearGradient id="spine-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F1EA" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>

  <!-- Fundo da imagem (Cor Paper) -->
  <rect class="paper-bg" width="1080" height="1080" />

  <!-- Grupo do Livrinho Reduzido e Centralizado -->
  <g filter="url(#shadow)">
    <!-- Fundo do livro -->
    <!-- X=280, Y=200, W=540, H=680 -->
    <!-- Assim o centro é X=550, Y=540. O livro cabe livremente na foto do Instagram sem ser cortado pelo círculo -->
    <path class="book-bg" d="M 280 200 L 770 200 A 50 50 0 0 1 820 250 L 820 830 A 50 50 0 0 1 770 880 L 280 880 Z" />
    
    <!-- Borda do livro (Agora usando cor escura #2B2620 Ink) -->
    <path class="book-border" d="M 280 200 L 770 200 A 50 50 0 0 1 820 250 L 820 830 A 50 50 0 0 1 770 880 L 280 880 Z" />
    
    <!-- Lombada -->
    <rect x="280" y="200" width="60" height="680" fill="url(#spine-gradient)" />
    <!-- Linha divisória da lombada -->
    <line class="spine-lines" x1="340" y1="200" x2="340" y2="880" />
  </g>

  <!-- Elementos de Texto (Centralizados no espaço útil do livro) -->
  <!-- O espaço útil do caderno vai do X=340 ao X=820. O centro visual é 340 + (480 / 2) = 580. -->
  <g text-anchor="middle">
    <!-- O grande 'K' menor que antes mas ainda imponente -->
    <text class="k-letter" x="580" y="520">K</text>
    
    <!-- Palavra "Kadernim" escrita abaixo -->
    <text class="brand-name" x="580" y="700">Kadernim</text>
  </g>

  <!-- Espirais (Argolas) -->
  <g filter="url(#spiral-shadow)">
    <!-- O. cx = 266 faz com que a argola de raio 14 ultrapasse 14 pixels para fora e para dentro do livro -->
    <!-- Distribuição vertical entre Y=250 e Y=830 (580px de altura). 9 argolas = 8 espaços de 72.5px -->
    <circle class="spiral" cx="266" cy="250" r="14" />
    <circle class="spiral" cx="266" cy="322.5" r="14" />
    <circle class="spiral" cx="266" cy="395" r="14" />
    <circle class="spiral" cx="266" cy="467.5" r="14" />
    <circle class="spiral" cx="266" cy="540" r="14" />
    <circle class="spiral" cx="266" cy="612.5" r="14" />
    <circle class="spiral" cx="266" cy="685" r="14" />
    <circle class="spiral" cx="266" cy="757.5" r="14" />
    <circle class="spiral" cx="266" cy="830" r="14" />
  </g>
</svg>
